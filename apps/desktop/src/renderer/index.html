<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carbon Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }
    #app { display: flex; height: 100vh; }
    .sidebar {
      width: 240px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
      font-weight: 600;
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .nav-item {
      padding: 12px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      font-size: 13px;
    }
    .nav-item:hover { background: #252525; }
    .nav-item.active {
      background: #1e3a1e;
      border-left-color: #4ade80;
      color: #4ade80;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 500; }
    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 { font-size: 14px; margin-bottom: 12px; color: #aaa; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #4ade80;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #4ade80;
      color: #0f0f0f;
    }
    .btn-primary:hover { background: #22c55e; }
    .btn-secondary {
      background: #333;
      color: #e0e0e0;
      margin-left: 8px;
    }
    .btn-secondary:hover { background: #444; }
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    .status-active { background: #1e3a1e; color: #4ade80; }
    .status-expired { background: #3a1e1e; color: #f87171; }
    .status-unknown { background: #2a2a2a; color: #888; }
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item-info h4 { font-size: 13px; font-weight: 500; }
    .list-item-info p { font-size: 11px; color: #666; margin-top: 2px; }
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .chat-message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .chat-message.user {
      align-self: flex-end;
      background: #1e3a1e;
      margin-left: auto;
    }
    .chat-message.assistant {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }
    .chat-input {
      display: flex;
      padding: 16px;
      border-top: 1px solid #2a2a2a;
      gap: 12px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    .chat-input input:focus { border-color: #4ade80; }
    .hidden { display: none !important; }
    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .btn-danger { background: #3a1e1e; color: #f87171; }
    .btn-danger:hover { background: #4a1e1e; }
    .form-control {
      padding: 10px 12px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    .form-control:focus { border-color: #4ade80; }
  </style>
</head>
<body>
  <div id="app">
    <nav class="sidebar">
      <div class="sidebar-header">Carbon Agent</div>
      <div class="nav-item active" data-view="playground"> Playground</div>
      <div class="nav-item" data-view="providers"> AI Providers</div>
      <div class="nav-item" data-view="profiles"> Cloak Bridge</div>
      <div class="nav-item" data-view="workspaces"> Workspaces</div>
      <div class="nav-item" data-view="ingestion"> Ingestion</div>
    </nav>
    <main class="main">
      <div class="header">
        <h1 id="page-title">Playground</h1>
        <span class="status-badge status-unknown" id="connection-status">Disconnected</span>
      </div>
      <div class="content" id="content">
        <!-- Views injected by JS -->
      </div>
    </main>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
